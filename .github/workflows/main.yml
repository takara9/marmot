name: marmot CI on self-hosted hv2
on: 
  push:
    paths-ignore:
      - 'docs/**'
      - 'README.md'

env:
  # Setting an environment variable with the value of a configuration variable
  env_var: ${{ vars.ENV_CONTEXT_VAR || 'MARMOT CI' }}
  DEBUG: true

jobs:
  # Label of the job
  start:
    runs-on: [ self-hosted, any ]
    steps:
    - uses: actions/checkout@v5

  moodule-tests:
    runs-on: [ self-hosted, any ]
    needs: 
      - start
    if: always() 
    steps:
    - uses: actions/checkout@v5
    - name: 時間調整
      run: | 
        sleep 10

  system-tests:
    runs-on: [ self-hosted, any ]
    needs: 
      - start
    if: always() 
    steps:
    - uses: actions/checkout@v5

  packages-run-as-nonroot:
    runs-on: [ self-hosted, any ]
    needs: 
      - moodule-tests
    if: always() 
    steps:
    - uses: actions/checkout@v5
    - name: コンフィグパッケージ
      run: | 
        cd pkg/config
        make test
        cd ../..
    - name: ETCDのデータアクセス パッケージ
      run: | 
        cd pkg/db
        make test
        cd ../..
    - name: QCOW2操作 パッケージ
      run: | 
        cd pkg/qcow
        make test
        cd ../..

  packages-run-as-root:
    runs-on: [ self-hosted, any ]
    needs: 
      - moodule-tests
    if: always() 
    steps:
    - uses: actions/checkout@v5
    - name: ロジカルボリューム マネージャー 操作パッケージ
      run: | 
        cd pkg/lvm
        sudo -s make test
        cd ../..
    - name: ランナーのセットアップ
      run: |
        sudo -E env "PATH=$PATH" ./tools/setup.sh
    - name: ユーティリティ パッケージ 
      run: | 
        cd pkg/util
        sudo -s make test
        cd ../..

  package-virsh:
    runs-on: [ self-hosted, any ]
    needs: 
      - moodule-tests
    if: always() 
    steps:
    - uses: actions/checkout@v5
    - name: ランナーのセットアップ
      run: |
        sudo -E env "PATH=$PATH" ./tools/setup.sh
    - name: 仮想ネットワーク作成
      run: | 
        sudo -E env "PATH=$PATH" ./tools/setup-libvirt-networks.sh
    - name: 仮想化操作 パッケージ
      run: | 
        cd pkg/virt
        sudo -s make test
        cd ../..

  package-marmotd-volume:
    runs-on: [ self-hosted, any ]
    needs: 
      - moodule-tests
    if: always()
    steps:
    - uses: actions/checkout@v5
    - name: Test pkg/marmotd ボリューム機能テスト
      run: |
        cd pkg/marmotd
        sudo -s make test-volume
        cd ../..

  package-marmotd-server:
    runs-on: [ self-hosted, any ]
    needs: 
      - moodule-tests
    if: always()
    steps:
    - uses: actions/checkout@v5
    - name: Test pkg/marmotd サーバー機能テスト
      run: |
        cd pkg/marmotd
        sudo -s make test-server
        cd ../..

  package-marmotd-etc:
    runs-on: [ self-hosted, any ]
    needs: 
      - moodule-tests
    if: always()
    steps:
    - uses: actions/checkout@v5
    - name: Test pkg/marmotd ネットワーク機能テスト
      run: |
        cd pkg/marmotd
        sudo -s make test-vnet
        sudo -s make test-ipnet
        sudo -s make test-cloud-init
        sudo -s make test-timeout
        sudo -s make test-backing-store
        sudo -s make test-config
        sudo -s make test-volume-backing-store 
        cd ../..

  package-marmotd-images:
    runs-on: [ self-hosted, any ]
    needs: 
      - moodule-tests
    if: always()
    steps:
    - uses: actions/checkout@v5
    - name: 仮想ネットワーク作成
      run: | 
        sudo -E env "PATH=$PATH" ./tools/setup-libvirt-networks.sh
    - name: Test pkg/marmotd サーバーとイメージ機能テスト
      run: |
        cd pkg/marmotd
        sudo -s make test-server-image
        cd ../..
 
  package-marmotd-osimage:
    runs-on: [ self-hosted, any ]
    needs: 
      - moodule-tests
    if: always()
    steps:
    - uses: actions/checkout@v5
    - name: Test pkg/marmotd OSイメージ機能テスト
      run: |
        cd pkg/marmotd
        sudo -s make test-osimage
        cd ../..

  # Label of the job
