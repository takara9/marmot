name: marmot CI on self-hosted
on: 
  push:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

env:
  # Setting an environment variable with the value of a configuration variable
  env_var: ${{ vars.ENV_CONTEXT_VAR || 'MARMOT CI' }}
  DEBUG: true
  GO_VERSION: '1.26.1'
  GOPATH: ${{ github.workspace }}/.go
  GOBIN: ${{ github.workspace }}/.go/bin
  GOCACHE: ${{ github.workspace }}/.cache/go-build
  GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod

jobs:
  # Label of the job
  marmot-package:
    runs-on: [ self-hosted ]
    steps:
    - uses: actions/checkout@v5
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: change permissions
      run: |
        sudo -S chown -R $USER:$USER /var/actions-runner/_work/marmot

    - name: Install ca-certificates
      run: |
        sudo apt update && sudo apt install -y ca-certificates dnsutils etcd-client
        sudo update-ca-certificates

    - name: 環境セットアップ
      run: |
        whoami
        export CI_ENVIRONMENT=true
        cd tools
        ls -al
        sudo -E env "PATH=$PATH" ./setup.sh
        cd ..

    - name: Setup for build
      run: |
        make setup

    - name: Test pkg/config
      run: | 
        cd pkg/config
        sudo -E env "PATH=$PATH" make test
        cd ../..

    - name: Test pkg/db
      run: | 
        cd pkg/db
        sudo -E env "PATH=$PATH" make test
        cd ../..

    - name: Test pkg/lvm
      run: | 
        cd pkg/lvm
        sudo -E env "PATH=$PATH" make test
        cd ../..

    - name: Test pkg/qcow2
      run: | 
        cd pkg/qcow
        sudo -E env "PATH=$PATH" make test
        cd ../..

    - name: Test pkg/util
      run: | 
        cd pkg/util
        sudo -E env "PATH=$PATH" make test
        cd ../..

    - name: Test pkg/virt
      run: | 
        cd pkg/virt
        sudo -E env "PATH=$PATH" make test
        cd ../..

    - name: Test pkg/marmotd ボリューム機能テスト
      run: |
        cd pkg/marmotd
        sudo -E env "PATH=$PATH" make test-volume
        cd ../..

    - name: Cleanup runner workspace
      if: always()
      run: |
        sudo -E env "PATH=$PATH" ./tools/cleanup.sh

  # Label of the job
  marmot-daemon-core:
    runs-on: [ self-hosted ]

    steps:
    - uses: actions/checkout@v5
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: change permissions
      run: |
        sudo -S chown -R $USER:$USER /var/actions-runner/_work/marmot

    - name: Install ca-certificates
      run: |
        sudo apt update && sudo apt install -y ca-certificates dnsutils etcd-client
        sudo update-ca-certificates

    - name: Setup for build
      run: |
        make setup
 
    - name: Test pkg/marmotd サーバー機能テスト
      run: |
        cd pkg/marmotd
        sudo -E env "PATH=$PATH" make test-server
        cd ../..

    - name: Cleanup runner workspace
      if: always()
      run: |
        sudo -E env "PATH=$PATH" ./tools/cleanup.sh

  marmot-daemon-api:
    runs-on: [ self-hosted ]

    steps:
    - uses: actions/checkout@v5
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: change permissions
      run: |
        sudo -S chown -R $USER:$USER /var/actions-runner/_work/marmot

    - name: Install ca-certificates
      run: |
        sudo apt update && sudo apt install -y ca-certificates dnsutils etcd-client
        sudo update-ca-certificates

    - name: Setup for build
      run: |
        make setup

    - name: Test pkg/marmotd API機能テスト
      run: |
        cd pkg/marmotd
        sudo -E env "PATH=$PATH" make test-api
        cd ../..

    - name: Cleanup runner workspace
      if: always()
      run: |
        sudo -E env "PATH=$PATH" ./tools/cleanup.sh

  marmot-daemon-network:
    runs-on: [ self-hosted ]

    steps:
    - uses: actions/checkout@v5
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: change permissions
      run: |
        sudo -S chown -R $USER:$USER /var/actions-runner/_work/marmot

    - name: Install ca-certificates
      run: |
        sudo apt update && sudo apt install -y ca-certificates dnsutils etcd-client
        sudo update-ca-certificates

    - name: Setup for build
      run: |
        make setup

    - name: Test pkg/marmotd ネットワーク機能テスト
      run: |
        cd pkg/marmotd
        sudo -E env "PATH=$PATH" make test-network-lower
        sudo -E env "PATH=$PATH" make test-network-upper
        cd ../..

    - name: Cleanup runner workspace
      if: always()
      run: |
        sudo -E env "PATH=$PATH" ./tools/cleanup.sh

  marmot-daemon-image:
    runs-on: [ self-hosted ]

    steps:
    - uses: actions/checkout@v5
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: change permissions
      run: |
        sudo -S chown -R $USER:$USER /var/actions-runner/_work/marmot

    - name: Install ca-certificates
      run: |
        sudo apt update && sudo apt install -y ca-certificates dnsutils etcd-client
        sudo update-ca-certificates

    - name: Setup for build
      run: |
        make setup

    - name: Test pkg/marmotd イメージ機能テスト
      run: |
        cd pkg/marmotd
        sudo -E env "PATH=$PATH" make test-image
        sudo -E env "PATH=$PATH" make test-server-image
        cd ../..

    - name: Cleanup runner workspace
      if: always()
      run: |
        sudo -E env "PATH=$PATH" ./tools/cleanup.sh

  marmot-daemon-cloud-init:
    runs-on: [ self-hosted ]

    steps:
    - uses: actions/checkout@v5
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: change permissions
      run: |
        sudo -S chown -R $USER:$USER /var/actions-runner/_work/marmot

    - name: Install ca-certificates
      run: |
        sudo apt update && sudo apt install -y ca-certificates dnsutils etcd-client
        sudo update-ca-certificates

    - name: Setup for build
      run: |
        make setup

    - name: Test pkg/marmotd cloud-init 機能テスト
      run: |
        cd pkg/marmotd
        sudo -E env "PATH=$PATH" make test-cloud-init
        cd ../..

    - name: Cleanup runner workspace
      if: always()
      run: |
        sudo -E env "PATH=$PATH" ./tools/cleanup.sh

  marmot-command-mactl:
    runs-on: [ self-hosted ]
    strategy:
      matrix:
        go-version: [ '1.26.1' ]
    steps:
    - uses: actions/checkout@v5
    - name: Setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Display Go version
      run: go version

    - name: change permissions
      run: |
        sudo -S chown -R $USER:$USER /var/actions-runner/_work/marmot

    - name: Install ca-certificates
      run: |
        sudo apt update && sudo apt install -y ca-certificates dnsutils etcd-client
        sudo update-ca-certificates

    - name: Test cmd/mactl
      run: | 
        cd cmd/mactl
        sudo -s mkdir -p bin
        sudo -s chown ubuntu:ubuntu bin
        sudo -s chmod 755 bin
        sudo -E env "PATH=$PATH" make mactl-test
        ls -la bin
        sudo -E env "PATH=$PATH" make test
        sudo rm -fr bin
        cd ../..

    - name: Cleanup runner workspace
      if: always()
      run: |
        sudo -E env "PATH=$PATH" ./tools/cleanup.sh

  marmot-command-network:
    runs-on: [ self-hosted ]
    strategy:
      matrix:
        go-version: [ '1.26.1' ]
    steps:
    - uses: actions/checkout@v5
    - name: Setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Display Go version
      run: go version

    - name: change permissions
      run: |
        sudo -S chown -R $USER:$USER /var/actions-runner/_work/marmot

    - name: Install ca-certificates
      run: |
        sudo apt update && sudo apt install -y ca-certificates dnsutils etcd-client
        sudo update-ca-certificates

    - name: Test cmd/mactl-network
      run: |
        cd cmd/mactl
        sudo -s mkdir -p bin
        sudo -s chown ubuntu:ubuntu bin
        sudo -s chmod 755 bin
        sudo -E env "PATH=$PATH" make mactl-test
        sudo -E env "PATH=$PATH" make test-net
        sudo rm -fr bin
        cd ../..

    - name: Cleanup runner workspace
      if: always()
      run: |
        sudo -E env "PATH=$PATH" ./tools/cleanup.sh

  marmot-command-maadm:
    runs-on: [ self-hosted ]
    strategy:
      matrix:
        go-version: [ '1.26.1' ]
    steps:
    - uses: actions/checkout@v5
    - name: Setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Display Go version
      run: go version

    - name: change permissions
      run: |
        sudo -S chown -R $USER:$USER /var/actions-runner/_work/marmot

    - name: Install ca-certificates
      run: |
        sudo apt update && sudo apt install -y ca-certificates dnsutils etcd-client
        sudo update-ca-certificates

    - name: Test cmd/maadm
      run: |
        cd cmd/maadm
        sudo -s mkdir -p bin
        sudo -s chown ubuntu:ubuntu bin
        sudo -s chmod 755 bin
        sudo -E env "PATH=$PATH" make test
        sudo rm -fr bin
        cd ../..

    - name: Cleanup runner workspace
      if: always()
      run: |
        sudo -E env "PATH=$PATH" ./tools/cleanup.sh

