  #         sudo -E env "PATH=$PATH" ./tools/cleanup.sh

  moodule-tests-end:
    runs-on: [ self-hosted, any ]
    needs: 
      - packages-run-as-nonroot
      - packages-run-as-root
      - package-virsh
      - package-marmotd-volume
      - package-marmotd-server
      - package-marmotd-etc
      - package-marmotd-images
      - package-marmotd-osimage
    if: always() 
    steps:
    - uses: actions/checkout@v5

  system-tests-end:
    runs-on: [ self-hosted, any ]
    needs: 
      - mactl-vm-deploy-basic
      - mactl-vm-deploy-1
      - mactl-vm-deploy-2
      - mactl-vm-deploy-3
    if: always() 
    steps:
    - uses: actions/checkout@v5

  final-cleanup:
    runs-on: [ self-hosted, any ]
    needs: 
      - moodule-tests-end
      - system-tests-end
    if: always() 
    steps:
    - uses: actions/checkout@v5
    - name: 最終クリーンアップ
      run: |
        sleep 1
