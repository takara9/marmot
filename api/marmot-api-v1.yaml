openapi: "3.0.3"
info:
  version: 0.1.0
  title: REST API of Marmot Server
servers:
  - url: http://0.0.0.0:{port}{basePath}
    description: Marmot Server API
    variables:
      port:
        enum:
          - "8080"
        default: "8080"
      basePath:
        default: /api/v1
        description: Base path for the API
tags:
  - name: auth
  - name: user
  - name: role
  - name: authz
  - name: version
paths:
  /auth/login:
    post:
      summary: "Login and issue access token"
      operationId: apiAuthLogin
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: "Login succeeded"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      summary: "Logout current session"
      operationId: apiAuthLogout
      tags:
        - auth
      security:
        - BearerAuth: []
      responses:
        "204":
          description: "Logged out"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/me:
    get:
      summary: "Get current authenticated user"
      operationId: apiAuthMe
      tags:
        - auth
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "Current user information"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMe"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users:
    post:
      summary: "Create a user"
      operationId: apiCreateUser
      tags:
        - user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: "Created the user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      summary: "List users"
      operationId: apiListUsers
      tags:
        - user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "List of users"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Users"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}:
    get:
      summary: "Get a user"
      operationId: apiGetUserById
      tags:
        - user
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "User information"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: "Update a user"
      operationId: apiUpdateUserById
      tags:
        - user
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: "Updated the user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: "Delete a user"
      operationId: apiDeleteUserById
      tags:
        - user
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "Deleted the user"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}/password:
    post:
      summary: "Change or reset user password"
      operationId: apiChangeUserPassword
      tags:
        - user
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequest"
      responses:
        "204":
          description: "Password updated"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}/lock:
    post:
      summary: "Lock a user"
      operationId: apiLockUserById
      tags:
        - user
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "User locked"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}/unlock:
    post:
      summary: "Unlock a user"
      operationId: apiUnlockUserById
      tags:
        - user
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "User unlocked"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}/roles:
    get:
      summary: "List roles assigned to a user"
      operationId: apiListUserRoles
      tags:
        - user
        - role
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Roles assigned to the user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleNames"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: "Add a role to a user"
      operationId: apiAddUserRole
      tags:
        - user
        - role
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleAssignmentRequest"
      responses:
        "204":
          description: "Role added"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}/roles/{roleName}:
    delete:
      summary: "Remove a role from a user"
      operationId: apiDeleteUserRole
      tags:
        - user
        - role
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: roleName
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "Role removed"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}/apikeys:
    get:
      summary: "List API keys issued by a user"
      operationId: apiListUserApiKeys
      tags:
        - user
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "API keys for the user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeys"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: "Create an API key for a user"
      operationId: apiCreateUserApiKey
      tags:
        - user
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyCreateRequest"
      responses:
        "201":
          description: "API key created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}/apikeys/{apiKeyId}:
    delete:
      summary: "Delete an API key"
      operationId: apiDeleteUserApiKey
      tags:
        - user
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: apiKeyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "API key deleted"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /roles:
    get:
      summary: "List available roles"
      operationId: apiListRoles
      tags:
        - role
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "List of roles"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roles"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /roles/{roleName}:
    get:
      summary: "Get a role"
      operationId: apiGetRoleByName
      tags:
        - role
      security:
        - BearerAuth: []
      parameters:
        - name: roleName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Role information"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /authz/check:
    post:
      summary: "Check authorization for an action"
      operationId: apiAuthzCheck
      tags:
        - authz
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthzCheckRequest"
      responses:
        "200":
          description: "Authorization decision"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzCheckResponse"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /version:
    get:
      summary: "Get Version"
      operationId: apiGetVersion
      tags:
        - version
      responses:
        "200":
          description: Get Marmot Server Version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
  /ping:
    get:
      summary: "Alive"
      operationId: apiReplyPing
      tags:
        - alive
      responses:
        "200":
          description: Check Marmot Server is Alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplyMessage"
  /volume:
    post:
      summary: "Create Volume"
      operationId: apiCreateVolume
      tags:
        - storage
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Volume"
      responses:
        "200":
          description: Created the Volume
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      summary: "List Volumes"
      operationId: apiListVolumes
      tags:
        - storage
      responses:
        "200":
          description: List of Volumes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volume"
  /volume/{volumeId}:
    get:
      summary: "Info for a specific volume"
      operationId: apiShowVolumeById
      tags:
        - storage
      parameters:
        - name: volumeId
          in: path
          required: true
          description: The id of the volume to retrieve
          schema:
            type: string
    put:
      summary: "Update Volume"
      operationId: apiUpdateVolumeById
      tags:
        - storage
      parameters:
        - name: volumeId
          in: path
          required: true
          description: The id of the volume to update
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Volume"
      responses:
        "200":
          description: Updated the Volume
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: "Delete Volume"
      operationId: apiDeleteVolumeById
      tags:
        - storage
      parameters:
        - name: volumeId
          in: path
          required: true
          description: The id of the volume to delete
          schema:
            type: string
      responses:
        "200":
          description: Deleted the Volume
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /server:
    post:
      summary: "Create Virtual Server"
      description: |
        Create a new virtual server. The virtual server specifications are specified in the request body.
        If the virtual server is successfully created, the information of the created virtual server is returned in the response.
        The virtual server is then automatically started.
        The virtual server specifications include CPU, memory, storage, network settings, and more.
        If an error occurs during virtual server creation, an appropriate error message is returned.
      operationId: apiCreateServer
      tags:
        - server
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Server"
      responses:
        "201":
          description: "Successfully created and started the virtual server."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      summary: "Get Server Information"
      description: |
        Retrieve information about existing virtual servers. A list of virtual servers is returned in the response.
        Each virtual server's information includes server ID, status, resource usage, and more.
        If no virtual servers exist or an error occurs while retrieving information, an appropriate error message is returned.
      operationId: apiGetServers
      tags:
        - server
      responses:
        "200":
          description: "Successfully retrieved the list of servers."
          content:
            application/json:
              schema:
                  $ref: "#/components/schemas/Servers"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /server/{id}:
      get:
        summary: "Get particular server Information"
        operationId: apiGetServerById
        tags:
          - server
        parameters:
          - name: id
            in: path
            required: true
            description: The ID identifies the server.
            schema:
              type: string
        responses:
          "200":
            description: "Successfully retrieved the server information."
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Server"
          default:
            description: "An error occurred."
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
      put:
        summary: "Update Server Information by Id"
        operationId: apiUpdateServerById
        tags:
          - server
        parameters:
          - name: id
            in: path
            required: true
            description: The id of the server to update
            schema:
              type: string
        requestBody:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"
        responses:
          "200":
            description: Updated the Server
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Success"
          default:
            description: unexpected error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
      delete:
        summary: "Delete Server"
        operationId: apiDeleteServerById
        tags:
          - server
        parameters:
          - name: id
            in: path
            required: true
            description: The id of the server to delete
            schema:
              type: string
        responses:
          "200":
            description: Deleted the Server
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Success"
          default:
            description: unexpected error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
      post:
        summary: "Create image from Server Object by Id"
        operationId: apiMakeImageEntryFromRunningVMById
        tags:
          - server
        parameters:
          - name: id
            in: path
            required: true
            description: The id of the server to create an image from running server
            schema:
              type: string
        requestBody:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Image"
        responses:
          "200":
            description: Successfully created an image from the server
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Success"
          default:
            description: unexpected error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
  /server/{id}/stop:
      post:
        summary: "Stop Server by Id"
        operationId: apiStopServerById
        tags:
          - server
        parameters:
          - name: id
            in: path
            required: true
            description: The id of the server to stop
            schema:
              type: string
        responses:
          "200":
            description: Accepted the request to stop the server
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Success"
          default:
            description: unexpected error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
  /server/{id}/console:
      get:
        summary: "Connect to Server Console by Id"
        operationId: apiConsoleServerById
        tags:
          - server
        parameters:
          - name: id
            in: path
            required: true
            description: The id of the server to connect console
            schema:
              type: string
        responses:
          "200":
            description: Connected to the server console stream
            content:
              text/plain:
                schema:
                  type: string
                  format: binary
          default:
            description: unexpected error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
  /server/{id}/start:
      post:
        summary: "Start Server by Id"
        operationId: apiStartServerById
        tags:
          - server
        parameters:
          - name: id
            in: path
            required: true
            description: The id of the server to start
            schema:
              type: string
        responses:
          "200":
            description: Accepted the request to start the server
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Success"
          default:
            description: unexpected error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
  /network:
    post:
      summary: "Create Virtual Network"
      description: |
        Create a new virtual network. The virtual network specifications are specified in the request body.
        If the virtual network is successfully created, the information of the created virtual network is returned in the response.
        The virtual network specifications include network name, IP address range, DHCP settings, and more.
        If an error occurs during virtual network creation, an appropriate error message is returned.
      operationId: apiCreateNetwork
      tags:
        - network
        - virtual-network
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VirtualNetwork"
      responses:
        "201":
          description: "Successfully created the virtual network."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      summary: "Get Network Information"
      description: |
        Retrieve information about existing virtual networks. A list of virtual networks is returned in the response.
        Each virtual network's information includes network ID, status, IP address range, DHCP settings, and more.
        If no virtual networks exist or an error occurs while retrieving information, an appropriate error message is returned.
      operationId: apiGetNetworks
      tags:
        - network
      responses:
        "200":
          description: "Successfully retrieved the list of networks."
          content:
            application/json:
              schema:
                  $ref: "#/components/schemas/VirtualNetwork"
        default:
          description: "An error occurred."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error" 
  /network/{id}:
      get:
        summary: "Get particular virtual network Information"
        operationId: apiGetNetworkById
        tags:
          - network
          - virtual-network
        parameters:
          - name: id
            in: path
            required: true
            description: The ID identifies the virtual network.
            schema:
              type: string
        responses:
          "200":
            description: "Successfully retrieved the virtual network information."
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/VirtualNetwork"
          default:
            description: "An error occurred."
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
      put:
        summary: "Update Virtual Network Information by Id"
        operationId: apiUpdateNetworkById
        tags:
          - network
          - virtual-network
        parameters:
          - name: id
            in: path
            required: true
            description: The id of the virtual network to update
            schema:
              type: string
        requestBody:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualNetwork"
        responses:
          "200":
            description: Updated the Virtual Network
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Success"
          default:
            description: unexpected error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
      delete:
        summary: "Delete Virtual Network"
        operationId: apiDeleteNetworkById
        tags:
          - network
          - virtual-network
        parameters:
          - name: id
            in: path
            required: true
            description: The id of the virtual network to delete
            schema:
              type: string
        responses:
          "200":
            description: Deleted the Virtual Network
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Success"
          default:
            description: unexpected error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
  /gateway:
    post:
      summary: "Create Gateway"
      operationId: apiCreateGateway
      tags:
        - gateway
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Gateway"
      responses:
        "201":
          description: Created the Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gateway"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      summary: "List Gateways"
      operationId: apiGetGateways
      tags:
        - gateway
      responses:
        "200":
          description: List of Gateways
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Gateway"
  /gateway/{id}:
    get:
      summary: "Info for a specific gateway"
      operationId: apiGetGatewayById
      tags:
        - gateway
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the gateway to retrieve
          schema:
            type: string
      responses:
        "200":
          description: Gateway details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gateway"
        default:
          description: unexpected error
          content:
