              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Pong:
      type: object
      required:
        - ping
      properties:
        ping:
          type: string
          example: pong
    Version:
      type: object
      required:
        - clientVersion
      properties:
        serverVersion:
          type: string
        clientVersion:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    Success:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        message:
          type: string
    ReplyMessage:
      type: object
      properties:
        message:
          type: string
          example: "ok"
      required:
        - message
    Volume:
      type: object
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      properties:
        apiVersion:
          type: string
        kind:
          type: string          
        metadata:
          $ref: "#/components/schemas/Metadata"
        status:
          $ref: "#/components/schemas/Status"
        spec:
          $ref: "#/components/schemas/VolSpec"
    VolSpec:
      type: object
      properties:
        type:
          type: string
        kind:
          type: string
        iscsi:
          type: boolean
        iscsiTargetIqn:
          type: string
        volumeGroup:
          type: string
        logicalVolume:
          type: string
        size:
          type: integer
          format: int
        path:
          type: string
        osVariant:
          type: string
        persistent:
          type: boolean
    NetworkInterface:
      type: object
      required:
        - networkid
        - networkname
      properties:
        networkid:
          type: string
        networkname:
          type: string
        uuid:
          type: string
        ethernet:
          type: string
        mac:
          type: string
        dhcp4:
          type: boolean
        dhcp6:
          type: boolean
        address:
          type: string
        netmask:
          type: string
        netmasklen:
          type: integer
          format: int
        ipNetworkId:
          type: string
        ipGateway:
          type: string
        nameservers:
          type: object
          $ref: "#/components/schemas/Nameservers"
        routes:
          type: array
          maxItems: 6
          items:
            $ref: "#/components/schemas/Route"
        portgroup:
          type: string
        vlans:
          type: array
          maxItems: 4
          items:
            type: integer
            format: uint
    Nameservers:
      type: object
      properties:
        addresses:
          type: array
          maxItems: 4
          items:
            type: string
        search:
          type: array
          maxItems: 4
          items:
            type: string
    Route:
      type: object
      properties:
        to:
          type: string
        via:
          type: string
    Servers:
      type: array
      maxItems: 100
      items:
        $ref: "#/components/schemas/Server"
    Server:
      type: object
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: "#/components/schemas/Metadata"
        spec:
          $ref: "#/components/schemas/ServerSpec"
        status:
          $ref: "#/components/schemas/Status"
    Status:
      type: object
      required:
        - statusCode
      properties:
        statusCode:
          type: integer
          format: int
        status:
          type: string
        creationTimeStamp:
          type: string
          format: date-time
        deletionTimeStamp:
          type: string
          format: date-time
        lastUpdateTimeStamp:
          type: string
          format: date-time
        message:
          type: string
        console:
          type: string
    Metadata:
      type: object
      required:
        - name
        - id
      properties:
        id:
          type: string
        nodeName:
          type: string
        name:
          type: string
        uuid:
          type: string
        key:
          type: string
        instanceName:
          type: string
        comment:
          type: string
        labels:
          type: object
          additonalProperties:
            type: string
          example:
            key1: "value1"
            key2: "value2"
    ServerAnsible:
      type: object
      required:
        - playbook
        - inventory
      properties:
        playbook:
          type: string
        inventory:
          type: string
        extra-args:
          type: array
          items:
            type: string
    ServerSpec:
      type: object
      properties:
        ansible:
          $ref: "#/components/schemas/ServerAnsible"
        cpu:
          type: integer
          format: int
        memory:
          type: integer
          format: int
        networkInterface:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/NetworkInterface"
        storage:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/Volume"
        osLv:
          type: string
        osVg:
          type: string
        mmImage:
          type: string
        osVariant:
          type: string
          deprecated: true
        bootVolume:
          $ref: "#/components/schemas/Volume"
        auth:
          $ref: "#/components/schemas/Auth"
    VirtualNetwork:
      type: object
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: "#/components/schemas/Metadata"
        spec:
          $ref: "#/components/schemas/VirtualNetworkSpec"
        status:
          $ref: "#/components/schemas/Status"
    VirtualNetworkSpec:
      type: object
      properties:
        forwardMode:
          type: string
        bridgeName:
          type: string
        macAddress:
          type: string
        stp:
          type: boolean
        ipAddress:
          type: string
        netmask:
          type: string
        dhcp:
          type: boolean
        dhcpStartAddress:
          type: string
        dhcpEndAddress:
          type: string
        nat:
          type: boolean
        ipNetworkId:
          type: string
        iPNetworkAddress:
          type: string
        vpnAccess:
          type: boolean
          description: Enable VPN route injection for servers on this network.
        overlayMode:
          type: string
          description: "Overlay mode for multi-node networks: 'none' (default), 'geneve' (OVN-managed), or 'vxlan' (deprecated)."
          enum:
            - none
            - geneve
            - vxlan
        vni:
          type: integer
          description: "Overlay VNI (0-16777215) used by Geneve/VXLAN."
          minimum: 0
          maximum: 16777215
        underlayInterface:
          type: string
          description: "Interface name for underlay network used by overlay tunnels."
        peerPolicy:
          type: string
          description: "Policy for peer management: 'auto' or 'manual'. This field is ignored when OVN manages peers."
          enum:
            - auto
            - manual
    Gateway:
      type: object
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: "#/components/schemas/Metadata"
        spec:
          $ref: "#/components/schemas/GatewaySpec"
        status:
          $ref: "#/components/schemas/Status"
    GatewaySpec:
      type: object
      required:
        - bindPublicIpAddress
        - internalServerName
        - internalVirtualNetwork
        - serverPorts
      properties:
        bindPublicIpAddress:
          type: string
        internalServerName:
          type: string
        internalVirtualNetwork:
          type: string
        remoteCIDR:
          type: string
          description: Source CIDR allowed to access gateway forwarding.
        remoteCIDRs:
          type: array
          description: Source CIDR list allowed to access gateway forwarding. Empty means allow all.
          items:
            type: string
        serverPorts:
          type: array
          items:
            type: string
    VpnGateway:
      type: object
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: "#/components/schemas/Metadata"
        spec:
          $ref: "#/components/schemas/VpnGatewaySpec"
        status:
          $ref: "#/components/schemas/Status"
    VpnGatewaySpec:
      type: object
      required:
        - bindPublicIpAddress
        - internalVirtualNetwork
      properties:
        bindPublicIpAddress:
          type: string
        internalVirtualNetwork:
