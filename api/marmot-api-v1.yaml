    get:
      summary: "Get Marmot Cluster Status"
      description: |
        Retrieve host status for all cluster members.
        Each item includes node name, host id, resource capacity and allocation.
      operationId: apiGetMarmotCluster
      tags:
        - marmot
      responses:
