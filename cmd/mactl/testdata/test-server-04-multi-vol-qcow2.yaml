apiVersion: v1
kind: Server
metadata:
    name: test-server-04
    comment: "This is a test server configuration"
spec:
    cpu: 2
    memory: 2048
    osVariant: ubuntu22.04
    bootVolume:
        spec:
            type: qcow2
    networkInterface:
        - networkname: "host-bridge"
    storage:
        - metadata:
            name: "data-disk-1"
            comment: "data volume"
          spec:
            size: 100
            type: qcow2
            kind: data
        - metadata:
            name: "data-disk-2"
            comment: "backup volume"
          spec:
            size: 100
            type: qcow2
            kind: data
