apiVersion: v1
kind: Server
metadata:
    name: test-server-33
    comment: "This is a minimum configuration"
spec:
    cpu: 4
    memory: 8192
    osVariant: ubuntu22.04
    networkInterface:
        - networkname: "host-bridge"
          address: "192.168.1.98"
          netmasklen: 24
          routes:
            - to: "default"
              via: "192.168.1.1"
          nameservers:
            addresses:
                - 192.168.1.9
                - 8.8.8.8
                - 8.8.4.4
            search:
                - labo.local
                - lab.local
        - networkname: "test-net-1"
