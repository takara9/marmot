apiVersion: v1
kind: Server
metadata:
    name: test-server-33
    comment: "故意にアドレスを衝突させて、失敗を確認します"
spec:
    cpu: 4
    memory: 8192
    osVariant: ubuntu22.04
    networkInterface:
        - networkname: "host-bridge"
          address: "192.168.1.191"
          netmasklen: 24
          routes:
            - to: "default"
              via: "192.168.1.1"
          nameservers:
            addresses:
                - 192.168.1.9
            search:
                - labo.local
        - networkname: "test-net-1"
