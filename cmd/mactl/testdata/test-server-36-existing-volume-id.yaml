apiVersion: v1
kind: Server
metadata:
    name: test-server-36
    comment: "Attach existing volumes by id"
spec:
    cpu: 1
    memory: 1024
    osVariant: ubuntu22.04
    bootVolume:
        id: "b7fd113"
        metadata:
            id: "b7fd113"
    storage:
        - id: "data1234"
          metadata:
            id: "data1234"
        - metadata:
            name: "my-data-vol"
    networkInterface:
        - networkname: "default"
