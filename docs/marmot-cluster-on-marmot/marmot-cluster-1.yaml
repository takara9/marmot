apiVersion: v1
kind: Server
metadata:
    name: marmot1
    comment: クラスタコントローラーのテスト用マシン 1/3
spec:
    cpu: 8
    memory: 16384
    osVariant: ubuntu24.04
    auth:
        url: https://github.com/takara9.keys
    networkInterface:
        - address: 192.168.1.201
          nameservers:
            addresses:
                - 192.168.1.9
                - 8.8.8.8
                - 8.8.4.4
            search:
                - labo.local
                - lab.local
          netmasklen: 24
          networkname: ovs-network
          portgroup: vlan-1002
          routes:
            - to: default
              via: 192.168.1.1
          vlans:
            - 1002
        - address: 172.16.0.201
          netmasklen: 16
          networkname: ovs-network
          portgroup: vlan-1001
          routes:
            - to: 10.0.0.0/8
              via: 172.16.0.1
          vlans:
            - 1001
    storage:
        - metadata:
            name: var
            comment: runnerの作業エリアとして利用
          spec:
            size: 200
        - metadata:
            name: vg1
            comment: OSディスク用のボリュームグループ
          spec:
            size: 100
        - metadata:
            name: vg2
            comment: DATAディスク用のボリュームグループ
          spec:
            size: 100
